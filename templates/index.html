<!DOCTYPE html>
<html>
<head>
    <title>Flask To-Do App</title>
</head>
<body>

<h1>Simple Flask To-Do List</h1>

<p>This web app allows users to add tasks to a simple to-do list using a Flask web server running on a GCP virtual machine.</p>

<form method="POST">
    <input type="text" name="task" placeholder="Enter task">
    <button type="submit">Add</button>
</form>

<ul>
    {% for task in tasks %}
        <li>{{ task }}</li>
    {% endfor %}
</ul>

</body>
</html>
