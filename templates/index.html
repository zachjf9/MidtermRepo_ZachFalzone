<!DOCTYPE html>
<html>
<head>
    <title>Flask To-Do App</title>
</head>
<body>

<h2>Simple Flask To-Do List</h2>

<form method="POST">
    <input type="text" name="task" placeholder="Enter task">
    <button type="submit">Add</button>
</form>

<ul>
    {% for task in tasks %}
        <li>{{ task }}</li>
    {% endfor %}
</ul>

</body>
</html>
